<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 780" width="100%" height="100%" style="background:#020617;font-family:monospace,sans-serif">
  <defs>
    <marker id="arw-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arw-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arw-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <marker id="arw-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
    <marker id="arw-slate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- ROW 1: USER -->
  <rect x="40" y="35" width="150" height="55" rx="6" fill="rgba(30,41,59,0.6)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="115" y="58" fill="white" font-size="12" font-weight="bold" text-anchor="middle">You</text>
  <text x="115" y="76" fill="#94a3b8" font-size="9" text-anchor="middle">Voice · CLI · WeChat</text>

  <rect x="290" y="35" width="170" height="55" rx="6" fill="rgba(8,51,68,0.5)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="375" y="58" fill="white" font-size="12" font-weight="bold" text-anchor="middle">Hermes Agent</text>
  <text x="375" y="76" fill="#94a3b8" font-size="9" text-anchor="middle">LLM + Tool Router</text>

  <line x1="190" y1="62" x2="287" y2="62" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arw-cyan)"/>
  <text x="240" y="56" fill="#64748b" font-size="8" text-anchor="middle">WeChat · SMS · CLI</text>

  <!-- ROW 2: macOS HOST -->
  <rect x="120" y="130" width="820" height="260" rx="12" fill="rgba(22,78,99,0.06)" stroke="#22d3ee" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="135" y="148" fill="#22d3ee" font-size="11" font-weight="bold" fill-opacity="0.7">macOS Host — Hermes Runtime</text>

  <rect x="170" y="170" width="240" height="65" rx="6" fill="rgba(8,51,68,0.45)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="290" y="195" fill="white" font-size="12" font-weight="bold" text-anchor="middle">home-hub skill</text>
  <text x="290" y="213" fill="#94a3b8" font-size="9" text-anchor="middle">Command Router · 14 Triggers</text>
  <text x="290" y="226" fill="#64748b" font-size="7" text-anchor="middle">routes to HA tools · pyatv · CLI</text>

  <rect x="580" y="170" width="240" height="65" rx="6" fill="rgba(8,51,68,0.45)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="700" y="195" fill="white" font-size="12" font-weight="bold" text-anchor="middle">hub-ctl CLI</text>
  <text x="700" y="213" fill="#94a3b8" font-size="9" text-anchor="middle">Bash Unified Interface</text>
  <text x="700" y="226" fill="#64748b" font-size="7" text-anchor="middle">HA + TTS broadcast + AirPlay scan</text>

  <line x1="410" y1="202" x2="577" y2="202" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arw-cyan)"/>

  <rect x="170" y="275" width="240" height="65" rx="6" fill="rgba(6,78,59,0.5)" stroke="#34d399" stroke-width="1.5"/>
  <text x="290" y="299" fill="white" font-size="12" font-weight="bold" text-anchor="middle">HA Toolset (built-in)</text>
  <text x="290" y="317" fill="#94a3b8" font-size="9" text-anchor="middle">ha_call_service · ha_list</text>
  <text x="290" y="330" fill="#64748b" font-size="7" text-anchor="middle">Hermes built-in · HA REST API</text>

  <rect x="580" y="275" width="240" height="65" rx="6" fill="rgba(6,78,59,0.5)" stroke="#34d399" stroke-width="1.5"/>
  <text x="700" y="299" fill="white" font-size="12" font-weight="bold" text-anchor="middle">pyatv</text>
  <text x="700" y="317" fill="#94a3b8" font-size="9" text-anchor="middle">Apple Device SDK</text>
  <text x="700" y="330" fill="#64748b" font-size="7" text-anchor="middle">RAOP · AirPlay · Companion</text>

  <line x1="290" y1="235" x2="290" y2="272" stroke="#34d399" stroke-width="1.5" marker-end="url(#arw-emerald)"/>
  <line x1="700" y1="235" x2="700" y2="272" stroke="#34d399" stroke-width="1.5" marker-end="url(#arw-emerald)"/>

  <!-- Hermes → home-hub (L-shaped) -->
  <path d="M 375 90 L 375 130 L 290 130 L 290 165" fill="none" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arw-cyan)"/>
  <text x="333" y="124" fill="#64748b" font-size="8" text-anchor="middle">load skill + config</text>

  <!-- hub-ctl also reaches HA -->
  <path d="M 500 202 L 500 230 Q 500 250 480 250 L 410 250 L 410 272" fill="none" stroke="#64748b" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arw-slate)"/>
  <text x="455" y="245" fill="#64748b" font-size="7" text-anchor="middle">also: hub-ctl ha *</text>

  <!-- ROW 3: HA DOCKER -->
  <rect x="120" y="440" width="400" height="240" rx="12" fill="rgba(251,191,36,0.05)" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="135" y="460" fill="#fbbf24" font-size="11" font-weight="bold">Home Assistant (Docker)</text>

  <rect x="150" y="475" width="340" height="38" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.2"/>
  <text x="320" y="499" fill="white" font-size="10" font-weight="bold" text-anchor="middle">REST API · :8123</text>

  <rect x="150" y="530" width="160" height="60" rx="6" fill="rgba(76,29,149,0.35)" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="230" y="554" fill="white" font-size="11" font-weight="bold" text-anchor="middle">Robot Vacuum</text>
  <text x="230" y="574" fill="#a78bfa" font-size="8" text-anchor="middle">vacuum.*</text>

  <rect x="330" y="530" width="160" height="60" rx="6" fill="rgba(76,29,149,0.35)" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="410" y="554" fill="white" font-size="11" font-weight="bold" text-anchor="middle">Smart Lights</text>
  <text x="410" y="574" fill="#a78bfa" font-size="8" text-anchor="middle">light.*</text>

  <rect x="150" y="605" width="160" height="60" rx="6" fill="rgba(76,29,149,0.35)" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="230" y="629" fill="white" font-size="11" font-weight="bold" text-anchor="middle">Door Lock</text>
  <text x="230" y="649" fill="#a78bfa" font-size="8" text-anchor="middle">lock.*</text>

  <rect x="330" y="605" width="160" height="60" rx="6" fill="rgba(76,29,149,0.35)" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="410" y="629" fill="white" font-size="11" font-weight="bold" text-anchor="middle">Sensors</text>
  <text x="410" y="649" fill="#a78bfa" font-size="8" text-anchor="middle">sensor.*</text>

  <line x1="290" y1="340" x2="290" y2="437" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arw-amber)"/>
  <text x="270" y="385" fill="#64748b" font-size="8">HA API · long-lived token</text>

  <!-- ROW 3: APPLE -->
  <rect x="560" y="440" width="380" height="240" rx="12" fill="rgba(251,146,60,0.04)" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="575" y="460" fill="#fb923c" font-size="11" font-weight="bold">Apple AirPlay Devices</text>

  <rect x="585" y="478" width="145" height="50" rx="6" fill="rgba(251,146,60,0.18)" stroke="#fb923c" stroke-width="1.2"/>
  <text x="657" y="500" fill="white" font-size="11" font-weight="bold" text-anchor="middle">HomePod</text>
  <text x="657" y="516" fill="#fb923c" font-size="8" text-anchor="middle">RAOP TTS · Alarm</text>

  <rect x="755" y="478" width="145" height="50" rx="6" fill="rgba(251,146,60,0.18)" stroke="#fb923c" stroke-width="1.2"/>
  <text x="827" y="500" fill="white" font-size="11" font-weight="bold" text-anchor="middle">Apple TV</text>
  <text x="827" y="516" fill="#fb923c" font-size="8" text-anchor="middle">AirPlay · Companion</text>

  <rect x="585" y="548" width="315" height="60" rx="6" fill="rgba(251,146,60,0.18)" stroke="#fb923c" stroke-width="1.2"/>
  <text x="742" y="572" fill="white" font-size="11" font-weight="bold" text-anchor="middle">AirPort Express</text>
  <text x="742" y="592" fill="#fb923c" font-size="8" text-anchor="middle">RAOP → Amp → Bookshelf Speakers (Best Audio Quality)</text>

  <rect x="585" y="625" width="315" height="38" rx="6" fill="rgba(8,51,68,0.3)" stroke="#22d3ee" stroke-width="1.2"/>
  <text x="742" y="649" fill="white" font-size="9" font-weight="500" text-anchor="middle">macOS Host uses pyatv for mDNS discovery + streaming</text>

  <line x1="700" y1="340" x2="700" y2="437" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arw-amber)"/>
  <text x="720" y="385" fill="#64748b" font-size="8">mDNS · RAOP stream</text>

  <!-- LEGEND -->
  <rect x="860" y="148" width="80" height="145" rx="6" fill="rgba(15,23,42,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="900" y="166" fill="white" font-size="9" font-weight="bold" text-anchor="middle">Legend</text>
  
  <rect x="872" y="178" width="12" height="8" rx="2" fill="rgba(8,51,68,0.45)" stroke="#22d3ee" stroke-width="1"/>
  <text x="890" y="185" fill="#94a3b8" font-size="7">Hermes</text>
  
  <rect x="872" y="192" width="12" height="8" rx="2" fill="rgba(6,78,59,0.5)" stroke="#34d399" stroke-width="1"/>
  <text x="890" y="199" fill="#94a3b8" font-size="7">Integration</text>
  
  <rect x="872" y="206" width="12" height="8" rx="2" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1"/>
  <text x="890" y="213" fill="#94a3b8" font-size="7">HA</text>
  
  <rect x="872" y="220" width="12" height="8" rx="2" fill="rgba(251,146,60,0.18)" stroke="#fb923c" stroke-width="1"/>
  <text x="890" y="227" fill="#94a3b8" font-size="7">Apple</text>
  
  <rect x="872" y="234" width="12" height="8" rx="2" fill="rgba(76,29,149,0.35)" stroke="#a78bfa" stroke-width="1"/>
  <text x="890" y="241" fill="#94a3b8" font-size="7">Device</text>
  
  <rect x="872" y="248" width="12" height="8" rx="2" fill="rgba(30,41,59,0.6)" stroke="#94a3b8" stroke-width="1"/>
  <text x="890" y="255" fill="#94a3b8" font-size="7">External</text>

  <!-- NETWORK LABEL -->
  <rect x="355" y="700" width="340" height="34" rx="17" fill="rgba(30,41,59,0.85)" stroke="#64748b" stroke-width="1.2"/>
  <text x="525" y="722" fill="#64748b" font-size="10" text-anchor="middle">Same Subnet (LAN) — mDNS discovery</text>
</svg>
